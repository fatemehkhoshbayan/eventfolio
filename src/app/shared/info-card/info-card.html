<div
  class="bg-surface-container-low p-lg rounded-xl flex items-center justify-between group cursor-pointer hover:bg-primary-container transition-colors duration-300"
>
  <div class="flex items-start flex-col gap-1">
    <p class="text-label-md text-on-surface-variant group-hover:text-primary">
      {{ tierInfo().title }}
    </p>
    <h3 class="text-5xl font-bold text-primary">{{ tierInfo().number }}</h3>
  </div>
  <p
    [class]="
      [tierInfo().icon] + ' text-4xl text-primary/30 group-hover:text-primary transition-colors'
    "
  ></p>
</div>
