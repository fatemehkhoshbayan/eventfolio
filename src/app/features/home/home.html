<div class="p-base flex flex-col">
  <section class="relative overflow-hidden rounded-[24px] flex items-center">
    <div class="absolute inset-0 hero-vibrant-gradient z-0"></div>
    <div class="relative z-10 w-full md:w-3/5 px-lg py-xl">
      <span class="font-label-md text-label-md text-primary uppercase tracking-widest mb-sm block"
        >Memory Wall</span
      >
      <h1 class="font-display-lg text-display-lg text-on-background mb-md leading-tight max-w-3xl">
        Your life, documented with <span class="italic text-primary">intention</span>.
      </h1>
      <p class="font-body-lg text-body-lg text-on-surface-variant mb-lg max-w-5xl">
        A sophisticated digital sanctuary for your technical milestones, conference experiences, and
        engineering journey.
      </p>
      <div class="flex flex-wrap gap-sm">
        <button
          class="bg-primary text-on-primary px-lg py-md rounded-lg font-label-md text-label-md"
        >
          Explore
        </button>
        <button
          class="bg-surface-container-lowest border border-outline-variant text-primary px-lg py-md rounded-lg font-label-md text-label-md"
        >
          Learn More
        </button>
      </div>
    </div>
    <div
      class="hidden md:block absolute bottom-0 right-0 rounded-tl-xl overflow-hidden card-soft-shadow"
    >
      <img
        class="w-full h-full object-cover"
        alt="Eucalyptus sprig on a wooden surface with warm morning sunlight"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuAM0j-3ekJ-9RBAP4ba6H26fdyW_ox61A_dZrhvo0VipCEbotnDM74CN28G5GHsGen-lpSf8dYU73xxTmOyuhEbcww8OuCvLO2hV_Ap2ytAcQNaTtB0RnBQM5D6M49DszfMA-A7YgoTxA4-EhqRxYSSyvu3PtYeVlDEOzmjHVqkwICOihDE_TG6DDh8ls1gvUAPQejq0mwrkWRCE--ziabTEfXCmbNz_BbLZLb_0_gjPgSSas_6QoLAwNobq-RNU8A4M-ZkUzTB4bjJ"
      />
    </div>
  </section>
  <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 p-gutter gap-md">
    @for (card of TIER_INFO; track card.title) {
      <app-info-card [tierInfo]="card" />
    }
  </section>
</div>
